<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 - Acceso Denegado</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-red-50 to-orange-100 flex items-center justify-center p-4">

    <div class="text-center max-w-2xl">

        <div class="mb-8">
            <svg class="mx-auto h-32 w-32 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
            </svg>
        </div>

        <h1 class="text-6xl font-bold text-gray-800 mb-4">403</h1>

        <h2 class="text-2xl font-semibold text-gray-700 mb-4">
            Acceso Denegado
        </h2>

        <p class="text-gray-600 mb-8">
            Lo sentimos, no tienes permisos para acceder a esta sección del sistema.
        </p>

        <div class="space-x-4">

            <a href="javascript:history.back()"
               class="inline-block bg-gray-600 text-white px-6 py-3 rounded-lg font-semibold hover:bg-gray-700 transition duration-200">
                Volver
            </a>

            <a th:if="${usuario != null}"
               th:href="@{${usuario.dashboardUrl}}"
               class="inline-block bg-red-600 text-white px-6 py-3 rounded-lg font-semibold hover:bg-red-700 transition duration-200">
                Ir a mi Dashboard
            </a>

            <a th:unless="${usuario != null}"
               th:href="@{/login}"
               class="inline-block bg-red-600 text-white px-6 py-3 rounded-lg font-semibold hover:bg-red-700 transition duration-200">
                Iniciar Sesión
            </a>

        </div>

    </div>

</body>
</html>

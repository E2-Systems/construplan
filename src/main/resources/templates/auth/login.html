<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>ConstruPlan - Login</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#004E89',
                        secondary: '#FF6B35',
                        accent: '#FFD23F',
                    }
                }
            }
        }
    </script>
</head>

<body class="min-h-screen bg-gradient-to-br from-primary to-secondary flex items-center justify-center p-4">

<div class="w-full max-w-md">

    <div class="bg-white rounded-2xl shadow-2xl overflow-hidden animate-fade-in">

        <!-- Header -->
        <div class="bg-gradient-to-r from-primary to-blue-800 text-white px-8 py-10 text-center">

            <h1 class="text-3xl font-bold mb-2">
                ConstruPlan
            </h1>

            <p class="text-blue-100 text-sm">
                Sistema de Gestión de Planillas
            </p>

        </div>

        <!-- Form -->
        <div class="p-8">

            <!-- ERROR -->
            <div th:if="${error}"
                 class="mb-6 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg">

                <span th:text="${error}"></span>

            </div>

            <!-- SUCCESS -->
            <div th:if="${success}"
                 class="mb-6 bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg">

                <span th:text="${success}"></span>

            </div>

            <form th:action="@{/login}"
                  method="post"
                  class="space-y-6">

                <!-- Usuario -->
                <div>

                    <label for="username"
                           class="block text-sm font-semibold text-gray-700 mb-2">

                        Usuario

                    </label>

                    <input
                            type="text"
                            id="username"
                            name="username"
                            required

                            class="w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary">

                </div>

                <!-- Password -->
                <div>

                    <label for="password"
                           class="block text-sm font-semibold text-gray-700 mb-2">

                        Contraseña

                    </label>

                    <input
                            type="password"
                            id="password"
                            name="password"
                            required

                            class="w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary">

                </div>

                <!-- Submit -->
                <button
                        type="submit"

                        class="w-full bg-gradient-to-r from-primary to-blue-800 text-white font-semibold py-3 px-4 rounded-lg">

                    Iniciar Sesión

                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>

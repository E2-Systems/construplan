<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validación de Registros - ConstruPlan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#004E89', secondary: '#FF6B35', accent: '#FFD23F' } } }
        }
    </script>
</head>
<body class="bg-gray-50">

    <div th:replace="~{fragments/navbar :: navbar('validacion')}"></div>

    <div class="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">

        <!-- Encabezado -->
        <div class="px-4 py-6 sm:px-0 flex items-center justify-between">
            <div>
                <h1 class="text-3xl font-bold text-gray-900">Validación de Registros</h1>
                <p class="mt-1 text-sm text-gray-600">Revise y apruebe los registros diarios de los empleados</p>
            </div>
            <div class="flex items-center gap-3">
                <span class="inline-flex items-center px-4 py-2 rounded-full text-sm font-semibold bg-orange-100 text-orange-700"
                      th:text="'Pendientes: ' + ${totalPendientes}">
                </span>
                <a th:href="@{/campo/dashboard}"
                   class="inline-flex items-center px-4 py-2 rounded-lg text-sm font-medium text-gray-700 bg-white border border-gray-300 hover:bg-gray-50 transition shadow-sm">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                    </svg>
                    Volver al Dashboard
                </a>
            </div>
        </div>

        <!-- Mensajes flash -->
        <div th:if="${mensajeExito}" class="px-4 mb-4">
            <div class="bg-green-50 border border-green-200 text-green-800 px-4 py-3 rounded-lg flex items-center">
                <svg class="w-5 h-5 mr-3 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                <span th:text="${mensajeExito}"></span>
            </div>
        </div>
        <div th:if="${mensajeError}" class="px-4 mb-4">
            <div class="bg-red-50 border border-red-200 text-red-800 px-4 py-3 rounded-lg flex items-center">
                <svg class="w-5 h-5 mr-3 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                <span th:text="${mensajeError}"></span>
            </div>
        </div>

        <!-- Tabla de registros -->
        <div class="px-4" th:if="${!registros.isEmpty()}">
            <div class="bg-white shadow rounded-lg overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-primary">
                            <tr>
                                <th class="px-4 py-3 text-left text-xs font-semibold text-white uppercase tracking-wider">Empleado</th>
                                <th class="px-4 py-3 text-left text-xs font-semibold text-white uppercase tracking-wider">DNI</th>
                                <th class="px-4 py-3 text-left text-xs font-semibold text-white uppercase tracking-wider">Proyecto</th>
                                <th class="px-4 py-3 text-left text-xs font-semibold text-white uppercase tracking-wider">Tarea</th>
                                <th class="px-4 py-3 text-left text-xs font-semibold text-white uppercase tracking-wider">Fecha</th>
                                <th class="px-4 py-3 text-center text-xs font-semibold text-white uppercase tracking-wider">H. Inicio</th>
                                <th class="px-4 py-3 text-center text-xs font-semibold text-white uppercase tracking-wider">H. Fin</th>
                                <th class="px-4 py-3 text-center text-xs font-semibold text-white uppercase tracking-wider">Hrs Base</th>
                                <th class="px-4 py-3 text-center text-xs font-semibold text-white uppercase tracking-wider">Hrs Extra</th>
                                <th class="px-4 py-3 text-center text-xs font-semibold text-white uppercase tracking-wider">Estado</th>
                                <th class="px-4 py-3 text-center text-xs font-semibold text-white uppercase tracking-wider">Acciones</th>
                            </tr>
                        </thead>
                        <tbody class="bg-white divide-y divide-gray-200">
                            <tr th:each="registro : ${registros}" class="hover:bg-gray-50 transition">
                                <!-- Empleado -->
                                <td class="px-4 py-3 whitespace-nowrap">
                                    <div class="flex items-center">
                                        <div class="flex-shrink-0 h-8 w-8 bg-primary rounded-full flex items-center justify-center">
                                            <span class="text-xs font-bold text-white"
                                                  th:text="${registro.asignacion.empleado.nombres.substring(0,1) + registro.asignacion.empleado.apellidos.substring(0,1)}"></span>
                                        </div>
                                        <div class="ml-3">
                                            <p class="text-sm font-medium text-gray-900"
                                               th:text="${registro.asignacion.empleado.nombreCompleto}"></p>
                                        </div>
                                    </div>
                                </td>
                                <!-- DNI -->
                                <td class="px-4 py-3 whitespace-nowrap text-sm text-gray-600"
                                    th:text="${registro.asignacion.empleado.dni}"></td>
                                <!-- Proyecto -->
                                <td class="px-4 py-3 whitespace-nowrap text-sm text-gray-600"
                                    th:text="${registro.asignacion.proyecto.nombre}"></td>
                                <!-- Tarea -->
                                <td class="px-4 py-3 whitespace-nowrap">
                                    <span class="text-sm text-gray-900" th:text="${registro.asignacion.tarea.nombre}"></span>
                                </td>
                                <!-- Fecha -->
                                <td class="px-4 py-3 whitespace-nowrap text-sm text-gray-600"
                                    th:text="${#temporals.format(registro.asignacion.fecha, 'dd/MM/yyyy')}"></td>
                                <!-- Hora Inicio -->
                                <td class="px-4 py-3 whitespace-nowrap text-sm text-center text-gray-600"
                                    th:text="${registro.horaInicio != null ? #temporals.format(registro.horaInicio, 'HH:mm') : '—'}"></td>
                                <!-- Hora Fin -->
                                <td class="px-4 py-3 whitespace-nowrap text-sm text-center text-gray-600"
                                    th:text="${registro.horaFin != null ? #temporals.format(registro.horaFin, 'HH:mm') : '—'}"></td>
                                <!-- Horas Base -->
                                <td class="px-4 py-3 whitespace-nowrap text-sm text-center font-medium text-gray-900"
                                    th:text="${registro.horasBase != null ? registro.horasBase : '0.00'}"></td>
                                <!-- Horas Extra -->
                                <td class="px-4 py-3 whitespace-nowrap text-sm text-center"
                                    th:classappend="${registro.horasExtra != null and registro.horasExtra > 0 ? 'text-secondary font-semibold' : 'text-gray-500'}"
                                    th:text="${registro.horasExtra != null ? registro.horasExtra : '0.00'}"></td>
                                <!-- Estado -->
                                <td class="px-4 py-3 whitespace-nowrap text-center">
                                    <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-yellow-100 text-yellow-800">
                                        Pendiente
                                    </span>
                                </td>
                                <!-- Acciones -->
                                <td class="px-4 py-3 whitespace-nowrap text-center">
                                    <div class="flex items-center justify-center gap-2">
                                        <form th:action="@{/campo/validacion-registros/{id}/aprobar(id=${registro.idRegistro})}" method="post">
                                            <button type="submit"
                                                    class="inline-flex items-center px-3 py-1.5 rounded-md text-xs font-medium text-white bg-green-600 hover:bg-green-700 transition shadow-sm"
                                                    title="Aprobar registro">
                                                <svg class="w-3.5 h-3.5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                                                </svg>
                                                Aprobar
                                            </button>
                                        </form>
                                        <form th:action="@{/campo/validacion-registros/{id}/observar(id=${registro.idRegistro})}" method="post">
                                            <button type="submit"
                                                    class="inline-flex items-center px-3 py-1.5 rounded-md text-xs font-medium text-white bg-orange-500 hover:bg-orange-600 transition shadow-sm"
                                                    title="Marcar como observado">
                                                <svg class="w-3.5 h-3.5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                                                </svg>
                                                Observar
                                            </button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Estado vacío -->
        <div class="px-4" th:if="${registros.isEmpty()}">
            <div class="bg-white shadow rounded-lg p-12 text-center">
                <div class="mx-auto w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mb-4">
                    <svg class="w-8 h-8 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                </div>
                <h3 class="text-lg font-semibold text-gray-900 mb-1">¡Todo al día!</h3>
                <p class="text-sm text-gray-500">No hay registros pendientes de validación.</p>
                <a th:href="@{/campo/dashboard}"
                   class="inline-flex items-center mt-6 px-4 py-2 rounded-lg text-sm font-medium text-white bg-primary hover:opacity-90 transition shadow">
                    Volver al Dashboard
                </a>
            </div>
        </div>

    </div>

    <!-- Footer -->
    <div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>

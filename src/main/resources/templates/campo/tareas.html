<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Tareas - ConstruPlan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#004E89', secondary: '#FF6B35', accent: '#FFD23F' } } }
        }
    </script>
</head>
<body class="bg-gray-50">

    <div th:replace="~{fragments/navbar :: navbar('tareas')}"></div>

    <div class="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">

        <!-- Header -->
        <div class="px-4 py-6 sm:px-0 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold text-gray-900">Gestión de Tareas</h1>
                <p class="mt-2 text-sm text-gray-600">Administra las tareas disponibles para asignación</p>
            </div>
            <a th:href="@{/campo/tareas/nueva}"
               class="inline-flex items-center px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-primary hover:bg-blue-800 transition">
                <svg class="h-5 w-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                </svg>
                Nueva Tarea
            </a>
        </div>

        <!-- Mensajes flash -->
        <div class="px-4 mb-4">
            <div th:if="${mensaje}"
                 class="bg-green-50 border-l-4 border-green-400 p-4 rounded flex items-start">
                <svg class="h-5 w-5 text-green-400 mr-3 flex-shrink-0" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
                </svg>
                <p class="text-sm text-green-700" th:text="${mensaje}"></p>
            </div>
            <div th:if="${error}"
                 class="bg-red-50 border-l-4 border-red-400 p-4 rounded flex items-start">
                <svg class="h-5 w-5 text-red-400 mr-3 flex-shrink-0" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
                </svg>
                <p class="text-sm text-red-700" th:text="${error}"></p>
            </div>
        </div>

        <!-- Filtros -->
        <div class="px-4 mb-6">
            <div class="bg-white p-4 rounded-lg shadow">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Buscar</label>
                        <input type="text" id="searchInput" placeholder="Buscar por nombre..."
                               class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-primary focus:border-primary">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Filtrar por Unidad</label>
                        <select id="filterUnidad" class="w-full px-4 py-2 border border-gray-300 rounded-md">
                            <option value="">Todas las unidades</option>
                            <option value="m2">Metro cuadrado (m²)</option>
                            <option value="ml">Metro lineal (ml)</option>
                            <option value="unidad">Unidad</option>
                            <option value="hora">Hora</option>
                            <option value="kg">Kilogramo (kg)</option>
                        </select>
                    </div>
                    <div class="flex items-end">
                        <button onclick="resetFilters()"
                                class="px-4 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50 transition">
                            Limpiar filtros
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tabla -->
        <div class="px-4">
            <div class="bg-white shadow rounded-lg overflow-hidden">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">ID</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Nombre</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Descripción</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Unidad de Medida</th>
                            <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">Acciones</th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200" id="tareasTable">

                        <tr th:each="t : ${tareas}"
                            class="hover:bg-gray-50 tarea-row"
                            th:attr="data-nombre=${#strings.toLowerCase(t.nombre)}, data-unidad=${t.unidadMedida}">

                            <td class="px-6 py-4 text-sm text-gray-900"
                                th:text="'#' + ${t.idTarea}"></td>

                            <td class="px-6 py-4 whitespace-nowrap">
                                <div class="flex items-center">
                                    <div class="h-10 w-10 rounded-full bg-accent text-gray-800 flex items-center justify-center font-bold flex-shrink-0"
                                         th:text="${#strings.toUpperCase(#strings.substring(t.nombre, 0, 1))}"></div>
                                    <div class="ml-4 text-sm font-medium text-gray-900" th:text="${t.nombre}"></div>
                                </div>
                            </td>

                            <td class="px-6 py-4">
                                <div class="text-sm text-gray-900 max-w-xs truncate"
                                     th:text="${t.descripcion != null and !#strings.isEmpty(t.descripcion)} ? ${t.descripcion} : 'Sin descripción'"
                                     th:title="${t.descripcion}"></div>
                            </td>

                            <td class="px-6 py-4 whitespace-nowrap">
                                <span th:text="${t.unidadMedida}"
                                      th:classappend="${t.unidadMedida == 'm2'} ? 'bg-blue-100 text-blue-800' :
                                                      (${t.unidadMedida == 'ml'} ? 'bg-green-100 text-green-800' :
                                                      (${t.unidadMedida == 'unidad'} ? 'bg-purple-100 text-purple-800' :
                                                      (${t.unidadMedida == 'hora'} ? 'bg-yellow-100 text-yellow-800' :
                                                      (${t.unidadMedida == 'kg'} ? 'bg-red-100 text-red-800' :
                                                       'bg-gray-100 text-gray-800'))))"
                                      class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full">
                                </span>
                            </td>

                            <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                                <!-- Editar -->
                                <a th:href="@{/campo/tareas/{id}/editar(id=${t.idTarea})}"
                                   class="text-primary hover:text-blue-900 mr-4" title="Editar">
                                    <svg class="inline h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                                    </svg>
                                </a>
                                <!-- Ver Metas -->
                                <a th:href="@{/meta(tareaId=${t.idTarea})}"
                                   class="text-secondary hover:text-orange-900 mr-4" title="Ver Metas">
                                    <svg class="inline h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                                    </svg>
                                </a>
                                <!-- Eliminar — form POST en lugar de GET -->
                                <form th:action="@{/campo/tareas/{id}/eliminar(id=${t.idTarea})}"
                                      method="post" class="inline"
                                      onsubmit="return confirm('¿Está seguro de eliminar esta tarea?\n\nNota: Solo se podrá eliminar si no tiene asignaciones relacionadas.')">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="text-red-600 hover:text-red-900" title="Eliminar">
                                        <svg class="inline h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                                        </svg>
                                    </button>
                                </form>
                            </td>
                        </tr>

                        <!-- Sin tareas -->
                        <tr th:if="${#lists.isEmpty(tareas)}">
                            <td colspan="5" class="px-6 py-12 text-center">
                                <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                                </svg>
                                <h3 class="mt-2 text-sm font-medium text-gray-900">No hay tareas</h3>
                                <p class="mt-1 text-sm text-gray-500">Comienza creando una nueva tarea.</p>
                                <div class="mt-6">
                                    <a th:href="@{/campo/tareas/nueva}"
                                       class="inline-flex items-center px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-primary hover:bg-blue-700">
                                        <svg class="h-5 w-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                                        </svg>
                                        Nueva Tarea
                                    </a>
                                </div>
                            </td>
                        </tr>

                    </tbody>
                </table>
            </div>
        </div>
    </div>
	<div th:replace="~{fragments/footer :: footer}"></div>
	
    <script>
        document.getElementById('searchInput').addEventListener('keyup', filterTable);
        document.getElementById('filterUnidad').addEventListener('change', filterTable);

        function filterTable() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const unidad = document.getElementById('filterUnidad').value;
            document.querySelectorAll('.tarea-row').forEach(row => {
                const matchSearch = row.dataset.nombre.includes(search);
                const matchUnidad = unidad === '' || row.dataset.unidad === unidad;
                row.style.display = matchSearch && matchUnidad ? '' : 'none';
            });
        }

        function resetFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('filterUnidad').value = '';
            filterTable();
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
                xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asignaciones de Tareas - ConstruPlan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#004E89', secondary: '#FF6B35', accent: '#FFD23F' } } }
        }
    </script>
</head>
<body class="bg-gray-50">

    <div th:replace="~{fragments/navbar :: navbar('asignaciones')}"></div>

    <div class="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">

        <!-- Header -->
        <div class="px-4 py-6 sm:px-0 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold text-gray-900">Asignaciones de Tareas</h1>
                <p class="mt-2 text-sm text-gray-600">Asigna tareas a los empleados por proyecto y fecha</p>
            </div>
            <a th:href="@{/campo/asignaciones/nueva}"
               class="inline-flex items-center px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-primary hover:bg-blue-800 transition">
                <svg class="h-5 w-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                </svg>
                Nueva Asignación
            </a>
        </div>

        <!-- Mensajes flash -->
        <div class="px-4 mb-4">
            <div th:if="${mensaje}" class="bg-green-50 border-l-4 border-green-400 p-4 rounded flex items-start">
                <svg class="h-5 w-5 text-green-400 mr-3 flex-shrink-0" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
                </svg>
                <p class="text-sm text-green-700" th:text="${mensaje}"></p>
            </div>
            <div th:if="${error}" class="bg-red-50 border-l-4 border-red-400 p-4 rounded flex items-start">
                <svg class="h-5 w-5 text-red-400 mr-3 flex-shrink-0" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
                </svg>
                <p class="text-sm text-red-700" th:text="${error}"></p>
            </div>
        </div>

        <!-- Filtro por fecha -->
        <div class="px-4 mb-6">
            <div class="bg-white p-4 rounded-lg shadow">
                <form th:action="@{/campo/asignaciones}" method="get"
                      class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Filtrar por Fecha</label>
                        <input type="date" name="fecha"
                               th:value="${fechaFiltro}"
                               class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-primary focus:border-primary">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Acción</label>
                        <div class="flex space-x-2">
                            <button type="submit"
                                    class="flex-1 px-4 py-2 bg-primary text-white rounded-md hover:bg-blue-800 transition">
                                Filtrar
                            </button>
                            <a th:if="${fechaFiltro != null}"
                               th:href="@{/campo/asignaciones}"
                               class="flex-1 px-4 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50 transition text-center">
                                Limpiar
                            </a>
                        </div>
                    </div>
                    <div class="md:col-span-2 flex items-end">
                        <p class="text-sm text-gray-500"
                           th:text="${fechaFiltro != null} ? 'Mostrando asignaciones del ' + ${#temporals.format(fechaFiltro, 'dd/MM/yyyy')} : 'Mostrando todas las asignaciones'">
                        </p>
                    </div>
                </form>
            </div>
        </div>

        <!-- Tabla -->
        <div class="px-4">
            <div class="bg-white shadow rounded-lg overflow-hidden">

                <div th:if="${not #lists.isEmpty(asignaciones)}" class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Fecha</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Empleado</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Proyecto</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Tarea</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Meta</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Asignado por</th>
                                <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">Acciones</th>
                            </tr>
                        </thead>
                        <tbody class="bg-white divide-y divide-gray-200">

                            <tr th:each="a : ${asignaciones}" class="hover:bg-gray-50">

                                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900"
                                    th:text="${#temporals.format(a.fecha, 'dd/MM/yyyy')}"></td>

                                <td class="px-6 py-4 whitespace-nowrap">
                                    <div class="flex items-center">
                                        <div class="h-10 w-10 rounded-full bg-accent text-gray-800 flex items-center justify-center font-bold flex-shrink-0"
                                             th:text="${#strings.substring(a.empleado.nombres,0,1) + #strings.substring(a.empleado.apellidos,0,1)}"></div>
                                        <div class="ml-4">
                                            <div class="text-sm font-medium text-gray-900"
                                                 th:text="${a.empleado.nombres + ' ' + a.empleado.apellidos}"></div>
                                            <div class="text-sm text-gray-500" th:text="${a.empleado.dni}"></div>
                                        </div>
                                    </div>
                                </td>

                                <td class="px-6 py-4">
                                    <div class="text-sm text-gray-900" th:text="${a.proyecto.nombre}"></div>
                                    <div class="text-xs text-gray-500 truncate max-w-xs" th:text="${a.proyecto.descripcion}"></div>
                                </td>

                                <td class="px-6 py-4">
                                    <div class="text-sm text-gray-900" th:text="${a.tarea.nombre}"></div>
                                    <div class="text-xs text-gray-500" th:text="${a.tarea.unidadMedida}"></div>
                                </td>

                                <td class="px-6 py-4">
                                    <div class="text-sm font-medium text-gray-900">
                                        <span th:text="${#numbers.formatDecimal(a.meta.cantidad, 1, 2)}"></span>
                                        <span th:text="${a.tarea.unidadMedida}"></span>
                                    </div>
                                    <div class="text-xs text-gray-500">
                                        ≈ <span th:text="${#numbers.formatDecimal(a.meta.horasEquivalentes, 1, 2)}"></span> horas
                                    </div>
                                </td>

                                <td class="px-6 py-4 whitespace-nowrap">
                                    <div class="text-sm text-gray-900" th:text="${a.asignador.username}"></div>
                                    <div class="text-xs text-gray-500" th:text="${a.asignador.rol.descripcion}"></div>
                                </td>

                                <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">

                                    <!-- Ver detalle -->
                                    <a th:href="@{/campo/asignaciones/{id}(id=${a.idAsignacion})}"
                                       class="text-primary hover:text-blue-900 mr-3" title="Ver Detalle">
                                        <svg class="inline h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                                        </svg>
                                    </a>

                                    <!-- Editar y eliminar — solo si es el asignador o ADMIN -->
                                    <th:block th:if="${a.asignador.username == username or #authorization.expression('hasAuthority(''ROLE_ADMIN'')')}">
                                        <a th:href="@{/campo/asignaciones/{id}/editar(id=${a.idAsignacion})}"
                                           class="text-secondary hover:text-orange-900 mr-3" title="Editar">
                                            <svg class="inline h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                                            </svg>
                                        </a>
                                        <form th:action="@{/campo/asignaciones/{id}/eliminar(id=${a.idAsignacion})}"
                                              method="post" class="inline"
                                              onsubmit="return confirm('¿Está seguro de eliminar esta asignación?\n\nEsta acción no se puede deshacer.')">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                            <button type="submit" class="text-red-600 hover:text-red-900" title="Eliminar">
                                                <svg class="inline h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                                                </svg>
                                            </button>
                                        </form>
                                    </th:block>

                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Sin asignaciones -->
                <div th:if="${#lists.isEmpty(asignaciones)}" class="px-6 py-12 text-center">
                    <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                    </svg>
                    <h3 class="mt-2 text-sm font-medium text-gray-900">No hay asignaciones</h3>
                    <p class="mt-1 text-sm text-gray-500"
                       th:text="${fechaFiltro != null} ? 'No hay asignaciones para la fecha seleccionada' : 'Comienza creando una nueva asignación'"></p>
                    <div class="mt-6">
                        <a th:href="@{/campo/asignaciones/nueva}"
                           class="inline-flex items-center px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-primary hover:bg-blue-700">
                            <svg class="h-5 w-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                            </svg>
                            Nueva Asignación
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const fechaInput = document.querySelector('input[name="fecha"]');
            if (fechaInput && !fechaInput.value) {
                fechaInput.value = new Date().toISOString().split('T')[0];
            }
        });
    </script>
</body>
</html>

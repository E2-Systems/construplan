<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${action == 'update'} ? 'Editar Asignación - ConstruPlan' : 'Nueva Asignación - ConstruPlan'"></title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#004E89', secondary: '#FF6B35', accent: '#FFD23F' } } }
        }
    </script>
</head>
<body class="bg-gray-50">

    <div th:replace="~{fragments/navbar :: navbar('asignaciones')}"></div>

    <div class="max-w-4xl mx-auto py-6 sm:px-6 lg:px-8">

        <!-- Breadcrumb -->
        <div class="px-4 mb-6">
            <nav class="flex" aria-label="Breadcrumb">
                <ol class="flex items-center space-x-2">
                    <li>
                        <a th:href="@{/campo/dashboard}" class="text-gray-500 hover:text-gray-700">
                            <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 20 20">
                                <path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/>
                            </svg>
                        </a>
                    </li>
                    <li class="flex items-center">
                        <svg class="h-5 w-5 text-gray-400" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"/>
                        </svg>
                        <a th:href="@{/campo/asignaciones}" class="ml-2 text-gray-500 hover:text-gray-700">Asignaciones</a>
                    </li>
                    <li class="flex items-center">
                        <svg class="h-5 w-5 text-gray-400" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"/>
                        </svg>
                        <span class="ml-2 text-gray-700 font-medium"
                              th:text="${action == 'update'} ? 'Editar' : 'Nueva'"></span>
                    </li>
                </ol>
            </nav>
        </div>

        <!-- Header -->
        <div class="px-4 mb-6">
            <h1 class="text-3xl font-bold text-gray-900"
                th:text="${action == 'update'} ? 'Editar Asignación' : 'Nueva Asignación'"></h1>
            <p class="mt-2 text-sm text-gray-600"
               th:text="${action == 'update'} ? 'Modifique los campos correspondientes para actualizar la asignación de tarea' : 'Complete el formulario para realizar una nueva asignación de tarea diaria'"></p>
        </div>

        <!-- Error Alert -->
        <div th:if="${error}" class="px-4 mb-6">
            <div class="bg-red-50 border-l-4 border-red-400 p-4 rounded flex items-start">
                <svg class="h-5 w-5 text-red-400 flex-shrink-0" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
                </svg>
                <p class="ml-3 text-sm text-red-700" th:text="${error}"></p>
            </div>
        </div>

        <!-- Form -->
        <div class="px-4">
            <form th:action="${action == 'update'} ? @{/campo/asignaciones/{id}(id=${asignacion.idAsignacion})} : @{/campo/asignaciones}"
                  method="post"
                  id="asignacionForm"
                  class="bg-white shadow rounded-lg p-6 space-y-6">

                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <!-- Empleado Field -->
                <div>
                    <!-- Mode: Create -->
                    <div th:if="${action == 'create'}">
                        <label for="idEmpleado" class="block text-sm font-medium text-gray-700 mb-2">
                            Empleado <span class="text-red-500">*</span>
                        </label>
                        <select id="idEmpleado" name="idEmpleado" required
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent transition">
                            <option value="">Seleccione un empleado</option>
                            <option th:each="e : ${empleados}"
                                    th:value="${e.idEmpleado}"
                                    th:text="${e.nombres + ' ' + e.apellidos + ' (DNI: ' + e.dni + ')'}">
                            </option>
                        </select>
                    </div>

                    <!-- Mode: Update -->
                    <div th:if="${action == 'update'}">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Empleado</label>
                        <div class="px-4 py-2 bg-gray-100 border border-gray-300 rounded-lg text-gray-600 font-semibold"
                             th:text="${asignacion.empleado.nombres + ' ' + asignacion.empleado.apellidos}"></div>
                        <p class="mt-1 text-xs text-gray-500">El empleado asignado no puede modificarse en una asignación existente.</p>
                    </div>
                </div>

                <!-- Proyecto Field -->
                <div>
                    <label for="idProyecto" class="block text-sm font-medium text-gray-700 mb-2">
                        Proyecto <span class="text-red-500">*</span>
                    </label>
                    <select id="idProyecto" name="idProyecto" required
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent transition">
                        <option value="">Seleccione un proyecto</option>
                        <option th:each="p : ${proyectos}"
                                th:value="${p.idProyecto}"
                                th:text="${p.nombre}"
                                th:selected="${asignacion != null and asignacion.proyecto.idProyecto == p.idProyecto}">
                        </option>
                    </select>
                </div>

                <!-- Meta Field -->
                <div>
                    <label for="idMeta" class="block text-sm font-medium text-gray-700 mb-2">
                        Tarea y Meta de Producción <span class="text-red-500">*</span>
                    </label>
                    <select id="idMeta" name="idMeta" required
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent transition">
                        <option value="">Seleccione una tarea/meta</option>
                        <option th:each="m : ${metas}"
                                th:value="${m.idMeta}"
                                th:text="${m.tarea.nombre} + ' - Meta: ' + ${m.cantidad} + ' ' + ${m.tarea.unidadMedida} + ' (' + ${m.horasEquivalentes} + ' hrs)'"
                                th:selected="${asignacion != null and asignacion.meta.idMeta == m.idMeta}">
                        </option>
                    </select>
                </div>

                <!-- Fecha Field -->
                <div>
                    <label for="fecha" class="block text-sm font-medium text-gray-700 mb-2">
                        Fecha de Asignación <span class="text-red-500">*</span>
                    </label>
                    <input type="date"
                           id="fecha"
                           name="fecha"
                           required
                           th:value="${asignacion != null} ? ${asignacion.fecha} : ''"
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent transition">
                </div>

                <!-- Modalidad Field -->
                <div>
                    <label for="modalidad" class="block text-sm font-medium text-gray-700 mb-2">
                        Modalidad de Trabajo <span class="text-red-500">*</span>
                    </label>
                    <select id="modalidad" name="modalidad" required
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent transition">
                        <option value="">Seleccione una modalidad</option>
                        <option th:each="m : ${modalidades}"
                                th:value="${m}"
                                th:text="${m}"
                                th:selected="${asignacion != null and asignacion.modalidad == m}">
                        </option>
                    </select>
                </div>

                <!-- Action Buttons -->
                <div class="mt-8 flex items-center justify-end space-x-4 border-t pt-6">
                    <a th:href="@{/campo/asignaciones}"
                       class="px-6 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 transition font-medium">
                        Cancelar
                    </a>
                    <button type="submit"
                            class="px-6 py-2 bg-primary text-white rounded-lg hover:bg-blue-800 transition font-medium flex items-center">
                        <svg class="h-5 w-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path th:if="${action == 'update'}"
                                  stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                            <path th:unless="${action == 'update'}"
                                  stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                        </svg>
                        <span th:text="${action == 'update'} ? 'Guardar Cambios' : 'Crear Asignación'"></span>
                    </button>
                </div>

            </form>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Se coloca la fecha actual de forma automática al crear una nueva asignación
            const action = '[[${action}]]';
            const fechaInput = document.getElementById('fecha');
            if (fechaInput && !fechaInput.value) {
                fechaInput.value = new Date().toISOString().split('T')[0];
            }
        });

        document.getElementById('asignacionForm').addEventListener('submit', function(e) {
            const idEmpleado = document.getElementById('idEmpleado');
            if (idEmpleado && !idEmpleado.value) {
                e.preventDefault();
                alert('Debe seleccionar un empleado.');
                idEmpleado.focus();
                return;
            }
            if (!document.getElementById('idProyecto').value) {
                e.preventDefault();
                alert('Debe seleccionar un proyecto.');
                document.getElementById('idProyecto').focus();
                return;
            }
            if (!document.getElementById('idMeta').value) {
                e.preventDefault();
                alert('Debe seleccionar una tarea/meta.');
                document.getElementById('idMeta').focus();
                return;
            }
            if (!document.getElementById('fecha').value) {
                e.preventDefault();
                alert('Debe seleccionar una fecha.');
                document.getElementById('fecha').focus();
                return;
            }
            if (!document.getElementById('modalidad').value) {
                e.preventDefault();
                alert('Debe seleccionar una modalidad.');
                document.getElementById('modalidad').focus();
            }
        });
    </script>
</body>
</html>

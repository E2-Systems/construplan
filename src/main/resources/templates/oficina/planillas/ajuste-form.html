<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Ajuste - ConstruPlan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#004E89',
                        secondary: '#FF6B35',
                        accent: '#FFD23F',
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gray-50 flex flex-col min-h-screen">

    <!-- Navbar -->
    <div th:replace="~{fragments/navbar :: navbar('planillas')}"></div>

    <div class="max-w-xl mx-auto px-4 sm:px-6 lg:px-8 mt-10 w-full flex-grow">
        <!-- Mensaje de error flash -->
        <div class="mb-4" th:if="${error}">
            <div class="bg-red-100 border-l-4 border-red-500 text-red-700 p-4 rounded-xl shadow-sm" role="alert">
                <span class="block sm:inline font-medium" th:text="${error}"></span>
            </div>
        </div>

        <!-- Tarjeta del Ajuste -->
        <div class="bg-white rounded-2xl shadow-md border border-gray-100 overflow-hidden">
            <div class="bg-gradient-to-r from-indigo-700 to-indigo-900 px-6 py-5 text-white">
                <h2 class="text-xl font-bold">Registrar Ajuste Extraordinario</h2>
                <p class="text-xs text-indigo-100 mt-1" th:text="'Para: ' + ${planilla.empleado.nombreCompleto}"></p>
            </div>

            <form th:action="@{/oficina/planillas/{id}/ajustes/guardar(id=${planilla.idPlanilla})}" method="post" class="p-6 space-y-5">
                
                <!-- Tipo de Ajuste -->
                <div class="space-y-1.5">
                    <label for="tipo" class="block text-sm font-semibold text-gray-700">Tipo de Ajuste</label>
                    <select id="tipo" name="tipo" required 
                            class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition text-sm font-medium text-gray-700 shadow-sm bg-white">
                        <option th:each="tipoOpt : ${tipos}" 
                                th:value="${tipoOpt}" 
                                th:text="${tipoOpt.name() == 'ADELANTO' ? 'ADELANTO (Pago Anticipado)' : 'DESCUENTO (Deducción)'}">
                            ADELANTO
                        </option>
                    </select>
                </div>

                <!-- Monto -->
                <div class="space-y-1.5">
                    <label for="monto" class="block text-sm font-semibold text-gray-700">Monto (S/)</label>
                    <input type="number" id="monto" name="monto" min="0.01" step="0.01" required placeholder="0.00"
                           class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition text-sm font-semibold text-gray-800 shadow-sm" />
                </div>

                <!-- Motivo -->
                <div class="space-y-1.5">
                    <label for="motivo" class="block text-sm font-semibold text-gray-700">Motivo / Descripción</label>
                    <textarea id="motivo" name="motivo" rows="3" required placeholder="Escriba aquí el motivo detallado de la deducción o adelanto..."
                              class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition text-sm font-medium text-gray-700 shadow-sm resize-none"></textarea>
                </div>

                <!-- Botones de Acción -->
                <div class="flex items-center justify-between pt-4 border-t border-gray-100">
                    <a th:href="@{/oficina/planillas/detalle/{id}(id=${planilla.idPlanilla})}" 
                       class="px-5 py-2.5 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-xl transition text-sm font-semibold">
                        Cancelar
                    </a>
                    <button type="submit" 
                            class="px-6 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl shadow-md transition text-sm font-bold">
                        Guardar Ajuste
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <div th:replace="~{fragments/footer :: footer}"></div>

</body>

</html>

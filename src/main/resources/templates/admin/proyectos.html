<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyectos - ConstruPlan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#004E89', secondary: '#FF6B35', accent: '#FFD23F' } } }
        }
    </script>
</head>
<body class="bg-gray-50">

    <div th:replace="~{fragments/navbar :: navbar('proyectos')}"></div>

    <div class="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">

        <!-- Header -->
        <div class="px-4 py-6 sm:px-0 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold text-gray-900">Proyectos</h1>
                <p class="mt-2 text-sm text-gray-600">Gestiona los proyectos de construcción</p>
            </div>
            <a th:href="@{/campo/proyectos/nuevo}"
               class="inline-flex items-center px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-primary hover:bg-blue-800 transition">
                <svg class="h-5 w-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                </svg>
                Nuevo Proyecto
            </a>
        </div>

        <!-- Mensajes flash -->
        <div class="px-4 mb-4">
            <div th:if="${mensaje}" class="bg-green-50 border-l-4 border-green-400 p-4 rounded flex items-start">
                <svg class="h-5 w-5 text-green-400 mr-3 flex-shrink-0" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
                </svg>
                <p class="text-sm text-green-700" th:text="${mensaje}"></p>
            </div>
            <div th:if="${error}" class="bg-red-50 border-l-4 border-red-400 p-4 rounded flex items-start">
                <svg class="h-5 w-5 text-red-400 mr-3 flex-shrink-0" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
                </svg>
                <p class="text-sm text-red-700" th:text="${error}"></p>
            </div>
        </div>

        <!-- Filtro búsqueda -->
        <div class="px-4 mb-6">
            <div class="bg-white p-4 rounded-lg shadow">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Buscar</label>
                        <input type="text" id="searchInput" placeholder="Buscar por nombre..."
                               class="w-full px-4 py-2 border border-gray-300 rounded-md">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Estado</label>
                        <select id="filterEstado" class="w-full px-4 py-2 border border-gray-300 rounded-md">
                            <option value="">Todos</option>
                            <option value="true">Activos</option>
                            <option value="false">Inactivos</option>
                        </select>
                    </div>
                    <div class="flex items-end">
                        <button onclick="resetFilters()"
                                class="px-4 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50 transition">
                            Limpiar filtros
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tabla -->
        <div class="px-4">
            <div class="bg-white shadow rounded-lg overflow-hidden">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">ID</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Nombre</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Descripción</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Estado</th>
                            <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">Acciones</th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200" id="proyectosTable">

                        <tr th:each="p : ${proyectos}"
                            class="hover:bg-gray-50 proyecto-row"
                            th:attr="data-nombre=${#strings.toLowerCase(p.nombre)},
                                     data-activo=${p.activo}">

                            <td class="px-6 py-4 text-sm text-gray-900"
                                th:text="'#' + ${p.idProyecto}"></td>

                            <td class="px-6 py-4 whitespace-nowrap">
                                <div class="flex items-center">
                                    <div class="h-10 w-10 rounded-full bg-primary text-white flex items-center justify-center font-bold flex-shrink-0"
                                         th:text="${#strings.toUpperCase(#strings.substring(p.nombre,0,1))}"></div>
                                    <div class="ml-4 text-sm font-medium text-gray-900" th:text="${p.nombre}"></div>
                                </div>
                            </td>

                            <td class="px-6 py-4">
                                <div class="text-sm text-gray-900 max-w-xs truncate"
                                     th:text="${p.descripcion != null and !#strings.isEmpty(p.descripcion)} ? ${p.descripcion} : 'Sin descripción'"
                                     th:title="${p.descripcion}"></div>
                            </td>

                            <td class="px-6 py-4 whitespace-nowrap">
                                <span th:if="${p.activo}"
                                      class="px-2 py-1 text-xs font-semibold rounded-full bg-green-100 text-green-800">
                                    Activo
                                </span>
                                <span th:unless="${p.activo}"
                                      class="px-2 py-1 text-xs font-semibold rounded-full bg-gray-100 text-gray-800">
                                    Inactivo
                                </span>
                            </td>

                            <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium space-x-2">

                                <!-- Editar -->
                                <a th:href="@{/campo/proyectos/{id}/editar(id=${p.idProyecto})}"
                                   class="text-primary hover:text-blue-900" title="Editar">
                                    <svg class="inline h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                                    </svg>
                                </a>

                                <!-- Activar/Desactivar -->
                                <form th:action="@{/campo/proyectos/{id}/estado(id=${p.idProyecto})}"
                                      method="post" class="inline">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <input type="hidden" name="activo" th:value="${!p.activo}"/>
                                    <button type="submit"
                                            th:title="${p.activo} ? 'Desactivar' : 'Activar'"
                                            th:class="${p.activo} ? 'text-yellow-600 hover:text-yellow-900' : 'text-green-600 hover:text-green-900'">
                                        <svg class="inline h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path th:if="${p.activo}" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"/>
                                            <path th:unless="${p.activo}" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                        </svg>
                                    </button>
                                </form>

                                <!-- Eliminar -->
                                <form th:action="@{/campo/proyectos/{id}/eliminar(id=${p.idProyecto})}"
                                      method="post" class="inline"
                                      onsubmit="return confirm('¿Está seguro de eliminar este proyecto?')">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="text-red-600 hover:text-red-900" title="Eliminar">
                                        <svg class="inline h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                                        </svg>
                                    </button>
                                </form>
                            </td>
                        </tr>

                        <!-- Sin proyectos -->
                        <tr th:if="${#lists.isEmpty(proyectos)}">
                            <td colspan="5" class="px-6 py-12 text-center">
                                <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
                                </svg>
                                <h3 class="mt-2 text-sm font-medium text-gray-900">No hay proyectos</h3>
                                <p class="mt-1 text-sm text-gray-500">Comienza creando un nuevo proyecto.</p>
                                <div class="mt-6">
                                    <a th:href="@{/campo/proyectos/nuevo}"
                                       class="inline-flex items-center px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-primary hover:bg-blue-700">
                                        <svg class="h-5 w-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                                        </svg>
                                        Nuevo Proyecto
                                    </a>
                                </div>
                            </td>
                        </tr>

                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <script>
        document.getElementById('searchInput').addEventListener('keyup', filterTable);
        document.getElementById('filterEstado').addEventListener('change', filterTable);

        function filterTable() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const estado = document.getElementById('filterEstado').value;
            document.querySelectorAll('.proyecto-row').forEach(row => {
                const matchSearch = row.dataset.nombre.includes(search);
                const matchEstado = estado === '' || row.dataset.activo === estado;
                row.style.display = matchSearch && matchEstado ? '' : 'none';
            });
        }

        function resetFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('filterEstado').value = '';
            filterTable();
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Empleados - ConstruPlan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        /* Definición de colores corporativos del sistema ConstruPlan para Tailwind */
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#004E89',
                        secondary: '#FF6B35',
                        accent: '#FFD23F',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50">
    <!-- Navbar común con foco en la opción de empleados -->
    <div th:replace="~{fragments/navbar :: navbar('empleados')}"></div>

    <!-- Contenedor del contenido principal -->
    <div class="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">
        <!-- Cabecera de la vista y botón de creación de empleados -->
        <div class="px-4 py-6 sm:px-0 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold text-gray-900">Gestión de Empleados</h1>
                <p class="mt-2 text-sm text-gray-600">Administra los datos personales y contractuales del personal de obra</p>
            </div>
            <a th:href="@{/admin/empleados/nuevo}" 
               class="inline-flex items-center px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-primary hover:bg-blue-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition">
                <svg class="h-5 w-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/>
                </svg>
                Nuevo Empleado
            </a>
        </div>

        <!-- Alertas de éxito y error con lógica Thymeleaf -->
        <div class="px-4 mb-4">
            <div th:if="${mensaje}" class="bg-green-50 border-l-4 border-green-400 p-4 rounded shadow-sm">
                <div class="flex">
                    <div class="flex-shrink-0">
                        <svg class="h-5 w-5 text-green-400" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
                        </svg>
                    </div>
                    <div class="ml-3">
                        <p class="text-sm text-green-700" th:text="${mensaje}"></p>
                    </div>
                </div>
            </div>
            
            <div th:if="${error}" class="bg-red-50 border-l-4 border-red-400 p-4 rounded shadow-sm">
                <div class="flex">
                    <div class="flex-shrink-0">
                        <svg class="h-5 w-5 text-red-400" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
                        </svg>
                    </div>
                    <div class="ml-3">
                        <p class="text-sm text-red-700" th:text="${error}"></p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Filtros interactivos del lado del cliente -->
        <div class="px-4 mb-6">
            <div class="bg-white p-4 rounded-lg shadow">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Buscar</label>
                        <input type="text" id="searchInput" placeholder="Buscar por nombre o DNI..." 
                               class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-primary focus:border-primary">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Filtrar por Categoría</label>
                        <select id="filterCategory" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-primary focus:border-primary">
                            <option value="">Todas las categorías</option>
                            <option value="OPERARIO">Operario</option>
                            <option value="OFICIAL">Oficial</option>
                            <option value="AYUDANTE">Ayudante</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Filtrar por Estado</label>
                        <select id="filterStatus" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-primary focus:border-primary">
                            <option value="">Todos los estados</option>
                            <option value="true">Activos</option>
                            <option value="false">Inactivos</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tabla de visualización de empleados -->
        <div class="px-4">
            <div class="bg-white shadow rounded-lg overflow-hidden">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Empleado</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">DNI</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Categoría</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Teléfono / Dirección</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Usuario Asociado</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Estado</th>
                            <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Acciones</th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200" id="employeesTable">
                        <!-- Iteración sobre la lista de empleados mapeada en el modelo -->
                        <tr th:each="e : ${empleados}" class="hover:bg-gray-50 employee-row" 
                            th:attr="data-search=${#strings.toLowerCase(e.nombres + ' ' + e.apellidos + ' ' + e.dni)},
                                     data-category=${e.categoria != null ? e.categoria.name() : ''},
                                     data-status=${e.activo}">
                            <td class="px-6 py-4 whitespace-nowrap">
                                <div class="flex items-center">
                                    <div class="h-10 w-10 flex-shrink-0">
                                        <!-- Avatar circular con la inicial del empleado para un diseño limpio -->
                                        <div class="h-10 w-10 rounded-full bg-secondary text-white flex items-center justify-center font-bold"
                                             th:text="${#strings.toUpperCase(#strings.substring(e.nombres,0,1))}">
                                        </div>
                                    </div>
                                    <div class="ml-4">
                                        <div class="text-sm font-medium text-gray-900" th:text="${e.nombres} + ' ' + ${e.apellidos}"></div>
                                        <div class="text-xs text-gray-500" th:text="'ID: #' + ${e.idEmpleado}"></div>
                                    </div>
                                </div>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900" th:text="${e.dni}"></td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm">
                                <span th:if="${e.categoria != null}" th:text="${e.categoria.name()}"
                                      th:classappend="${e.categoria.name() == 'OPERARIO'} ? 'bg-indigo-100 text-indigo-800' :
                                                      (${e.categoria.name() == 'OFICIAL'} ? 'bg-yellow-100 text-yellow-800' :
                                                      'bg-green-100 text-green-800')"
                                      class="px-2.5 py-0.5 inline-flex text-xs leading-5 font-semibold rounded-full">
                                </span>
                                <span th:unless="${e.categoria != null}" class="text-gray-400 italic">No asignada</span>
                            </td>
                            <td class="px-6 py-4 text-sm text-gray-500">
                                <div th:text="${e.telefono != null && e.telefono != ''} ? ${e.telefono} : '-'"></div>
                                <div class="text-xs text-gray-400" th:text="${e.direccion != null && e.direccion != ''} ? ${e.direccion} : '-'"></div>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                                <div th:if="${e.usuario != null}" class="flex items-center space-x-1.5">
                                    <span class="inline-block w-2 h-2 rounded-full bg-blue-500"></span>
                                    <span th:text="${e.usuario.username}"></span>
                                </div>
                                <div th:unless="${e.usuario != null}" class="text-yellow-600 font-medium text-xs flex items-center space-x-1">
                                    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                                    </svg>
                                    <span>Sin acceso al sistema</span>
                                </div>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <span th:if="${e.activo}" class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-green-100 text-green-800">
                                    Activo
                                </span>
                                <span th:unless="${e.activo}" class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-red-100 text-red-800">
                                    Inactivo
                                </span>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium space-x-2">
                                <!-- Botón para abrir el formulario de edición -->
                                <a th:href="@{/admin/empleados/{id}/editar(id=${e.idEmpleado})}" 
                                   class="text-primary hover:text-blue-900 inline-block align-middle" title="Editar">
                                    <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                                    </svg>
                                </a>
                                <!-- Formulario seguro para habilitar o inhabilitar al empleado en el sistema con CSRF -->
                                <form th:action="@{/admin/empleados/{id}/estado(id=${e.idEmpleado})}" method="post" class="inline-block align-middle">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <input type="hidden" name="activo" th:value="${!e.activo}" />
                                    <button type="submit"
                                            th:class="${e.activo} ? 'text-orange-600 hover:text-orange-900' : 'text-green-600 hover:text-green-900'"
                                            th:title="${e.activo} ? 'Desactivar' : 'Activar'">
                                        <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path th:if="${e.activo}" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"/>
                                            <path th:unless="${e.activo}" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                        </svg>
                                    </button>
                                </form>
                            </td>
                        </tr>
                        <!-- Fila informativa en caso de no existir empleados -->
                        <tr th:if="${#lists.isEmpty(empleados)}">
                            <td colspan="7" class="px-6 py-12 text-center text-gray-500">
                                No hay empleados registrados en la base de datos
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Pie de página general -->
    <div th:replace="~{fragments/footer :: footer}"></div>

    <script>
        /* Filtros combinados de búsqueda textual, categoría y estado del empleado */
        document.getElementById('searchInput').addEventListener('keyup', filterTable);
        document.getElementById('filterCategory').addEventListener('change', filterTable);
        document.getElementById('filterStatus').addEventListener('change', filterTable);

        function filterTable() {
            const searchValue = document.getElementById('searchInput').value.toLowerCase();
            const categoryValue = document.getElementById('filterCategory').value;
            const statusValue = document.getElementById('filterStatus').value;
            const rows = document.querySelectorAll('.employee-row');

            rows.forEach(row => {
                const text = row.getAttribute('data-search');
                const category = row.getAttribute('data-category');
                const status = row.getAttribute('data-status');

                const matchSearch = text.includes(searchValue);
                const matchCategory = categoryValue === '' || category === categoryValue;
                const matchStatus = statusValue === '' || status === statusValue;

                if (matchSearch && matchCategory && matchStatus) {
                    row.style.display = '';
                } else {
                    row.style.display = 'none';
                }
            });
        }
    </script>
</body>
</html>

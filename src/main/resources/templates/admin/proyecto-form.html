<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${action == 'create'} ? 'Nuevo Proyecto - ConstruPlan' : 'Editar Proyecto - ConstruPlan'">Proyecto - ConstruPlan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#004E89',
                        secondary: '#FF6B35',
                        accent: '#FFD23F',
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gray-50 flex flex-col min-h-screen">

    <!-- Navbar -->
    <div th:replace="~{fragments/navbar :: navbar('proyectos')}"></div>

    <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 mt-10 w-full flex-grow">
        <!-- Mensajes de error -->
        <div class="mb-4" th:if="${error}">
            <div class="bg-red-100 border-l-4 border-red-500 text-red-700 p-4 rounded shadow-sm" role="alert">
                <span class="block sm:inline" th:text="${error}"></span>
            </div>
        </div>

        <!-- Tarjeta del Formulario -->
        <div class="bg-white rounded-xl shadow-md overflow-hidden border border-gray-100 p-8 mb-8">
            <div class="border-b pb-4 mb-6">
                <h1 class="text-2xl font-bold text-gray-900" 
                    th:text="${action == 'create'} ? 'Registrar Nuevo Proyecto' : 'Modificar Proyecto'">
                    Proyecto
                </h1>
                <p class="text-sm text-gray-600 mt-1">
                    Ingresa los datos generales para el proyecto de construcción.
                </p>
            </div>

            <!-- Formulario Spring MVC -->
            <form th:action="${action == 'create'} ? @{/admin/proyectos} : @{/admin/proyectos/{id}(id=${proyecto.idProyecto})}" 
                  th:object="${proyecto}" 
                  method="POST" 
                  class="space-y-6">
                
                <!-- CSRF Token (automático con th:action, pero explícito por seguridad) -->
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <!-- ID Proyecto (oculto en modo edición) -->
                <input type="hidden" th:if="${action == 'update'}" th:field="*{idProyecto}" />

                <!-- Nombre del Proyecto -->
                <div>
                    <label for="nombre" class="block text-sm font-semibold text-gray-700 mb-1">Nombre del Proyecto</label>
                    <input type="text" id="nombre" th:field="*{nombre}" required minlength="3"
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary text-sm"
                           placeholder="Ej. Edificación Multifamiliar Las Acacias" />
                    <p class="text-xs text-gray-500 mt-1">Debe contener al menos 3 caracteres.</p>
                </div>

                <!-- Descripción -->
                <div>
                    <label for="descripcion" class="block text-sm font-semibold text-gray-700 mb-1">Descripción / Ubicación</label>
                    <textarea id="descripcion" th:field="*{descripcion}" rows="4"
                              class="w-full px-4 py-2.5 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary text-sm"
                              placeholder="Describe los alcances o la localización del proyecto..."></textarea>
                </div>

                <!-- Estado Activo (solo en modo edición) -->
                <div class="flex items-center" th:if="${action == 'update'}">
                    <input type="checkbox" id="activo" th:field="*{activo}"
                           class="h-4 w-4 text-primary focus:ring-primary border-gray-300 rounded" />
                    <label for="activo" class="ml-2 block text-sm font-semibold text-gray-900">
                        Proyecto Activo (Disponible para asignaciones)
                    </label>
                </div>

                <!-- Botones de Acción -->
                <div class="flex items-center justify-end space-x-3 pt-4 border-t border-gray-100">
                    <a th:href="@{/admin/proyectos}"
                       class="px-4 py-2 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 hover:bg-gray-50 transition">
                        Cancelar
                    </a>
                    <button type="submit"
                            class="px-5 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-primary hover:bg-blue-800 transition focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary">
                        <span th:text="${action == 'create'} ? 'Crear Proyecto' : 'Guardar Cambios'">Guardar</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <div th:replace="~{fragments/footer :: footer}"></div>

</body>

</html>

<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Usuarios - ConstruPlan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        /* Se define la paleta de colores corporativos del sistema ConstruPlan */
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#004E89',
                        secondary: '#FF6B35',
                        accent: '#FFD23F',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50">
    <!-- Fragmento de navegación reutilizable para la interfaz de administración -->
    <div th:replace="~{fragments/navbar :: navbar('usuarios')}"></div>

    <!-- Contenido principal -->
    <div class="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">
        <!-- Cabecera con botón de creación de usuario -->
        <div class="px-4 py-6 sm:px-0 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold text-gray-900">Gestión de Usuarios</h1>
                <p class="mt-2 text-sm text-gray-600">Administra los usuarios del sistema</p>
            </div>
            <a th:href="@{/admin/usuarios/nuevo}" 
               class="inline-flex items-center px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-primary hover:bg-blue-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition">
                <svg class="h-5 w-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                </svg>
                Nuevo Usuario
            </a>
        </div>

        <!-- Alertas de éxito y error con lógica condicional de Thymeleaf -->
        <div class="px-4 mb-4">
            <div th:if="${mensaje}" class="bg-green-50 border-l-4 border-green-400 p-4 rounded shadow-sm">
                <div class="flex">
                    <div class="flex-shrink-0">
                        <svg class="h-5 w-5 text-green-400" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
                        </svg>
                    </div>
                    <div class="ml-3">
                        <p class="text-sm text-green-700" th:text="${mensaje}"></p>
                    </div>
                </div>
            </div>
            
            <div th:if="${error}" class="bg-red-50 border-l-4 border-red-400 p-4 rounded shadow-sm">
                <div class="flex">
                    <div class="flex-shrink-0">
                        <svg class="h-5 w-5 text-red-400" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
                        </svg>
                    </div>
                    <div class="ml-3">
                        <p class="text-sm text-red-700" th:text="${error}"></p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Filtros y búsqueda interactiva en el cliente -->
        <div class="px-4 mb-6">
            <div class="bg-white p-4 rounded-lg shadow">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Buscar</label>
                        <input type="text" id="searchInput" placeholder="Buscar por usuario..." 
                               class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-primary focus:border-primary">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Filtrar por Rol</label>
                        <select id="filterRol" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-primary focus:border-primary">
                            <option value="">Todos los roles</option>
                            <option value="ADMIN">Administrador</option>
                            <option value="OFICINA">Ingeniero de Oficina</option>
                            <option value="CAMPO">Ingeniero de Campo</option>
                            <option value="EMPLEADO">Empleado</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Filtrar por Estado</label>
                        <select id="filterEstado" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-primary focus:border-primary">
                            <option value="">Todos los estados</option>
                            <option value="true">Activos</option>
                            <option value="false">Inactivos</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tabla principal para mostrar la lista de usuarios -->
        <div class="px-4">
            <div class="bg-white shadow rounded-lg overflow-hidden">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ID</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Usuario</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Rol</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Estado</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Fecha Registro</th>
                            <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Acciones</th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200" id="usuariosTable">
                        <!-- Iteración sobre la lista de usuarios usando Thymeleaf -->
                        <tr th:each="u : ${usuarios}" class="hover:bg-gray-50 usuario-row" 
                            th:attr="data-username=${#strings.toLowerCase(u.username)},
                                     data-rol=${u.rol.name()},
                                     data-estado=${u.activo}">
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900" th:text="'#' + ${u.id}">
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <div class="flex items-center">
                                    <div class="h-10 w-10 flex-shrink-0">
                                        <!-- Inicial del usuario centrada con fondo de color corporativo -->
                                        <div class="h-10 w-10 rounded-full bg-primary text-white flex items-center justify-center font-bold"
                                             th:text="${#strings.toUpperCase(#strings.substring(u.username,0,1))}">
                                        </div>
                                    </div>
                                    <div class="ml-4">
                                        <div class="text-sm font-medium text-gray-900" th:text="${u.username}"></div>
                                    </div>
                                </div>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <!-- Colores semánticos diferenciados por tipo de rol -->
                                <span th:text="${u.rol.descripcion}"
                                      th:classappend="${u.rol.name() == 'ADMIN'} ? 'bg-red-100 text-red-800' :
                                                      (${u.rol.name() == 'OFICINA'} ? 'bg-purple-100 text-purple-800' :
                                                      (${u.rol.name() == 'CAMPO'} ? 'bg-yellow-100 text-yellow-800' :
                                                      'bg-blue-100 text-blue-800'))"
                                      class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full">
                                </span>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <span th:if="${u.activo}" class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-green-100 text-green-800">
                                    Activo
                                </span>
                                <span th:unless="${u.activo}" class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-red-100 text-red-800">
                                    Inactivo
                                </span>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500"
                                th:text="${u.fechaCreacion != null} ? ${#temporals.format(u.fechaCreacion, 'dd/MM/yyyy HH:mm')} : 'N/A'">
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium space-x-2">
                                <!-- Enlace de edición para redirigir al formulario del usuario respectivo -->
                                <a th:href="@{/admin/usuarios/{id}/editar(id=${u.id})}" 
                                   class="text-primary hover:text-blue-900 inline-block align-middle" title="Editar">
                                    <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                                    </svg>
                                </a>
                                <!-- Formulario seguro utilizando POST para alternar el estado activo/inactivo con protección CSRF -->
                                <form th:action="@{/admin/usuarios/{id}/estado(id=${u.id})}" method="post" class="inline-block align-middle">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <input type="hidden" name="activo" th:value="${!u.activo}" />
                                    <button type="submit"
                                            th:class="${u.activo} ? 'text-orange-600 hover:text-orange-900' : 'text-green-600 hover:text-green-900'"
                                            th:title="${u.activo} ? 'Desactivar' : 'Activar'">
                                        <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path th:if="${u.activo}" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"/>
                                            <path th:unless="${u.activo}" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                        </svg>
                                    </button>
                                </form>
                            </td>
                        </tr>
                        <!-- Fila mostrada únicamente en caso de no encontrarse registros -->
                        <tr th:if="${#lists.isEmpty(usuarios)}">
                            <td colspan="6" class="px-6 py-12 text-center text-gray-500">
                                No hay usuarios registrados
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Fragmento de pie de página común -->
    <div th:replace="~{fragments/footer :: footer}"></div>

    <script>
        /* Función para aplicar filtros combinados de búsqueda por texto, rol y estado en tiempo real */
        document.getElementById('searchInput').addEventListener('keyup', filterTable);
        document.getElementById('filterRol').addEventListener('change', filterTable);
        document.getElementById('filterEstado').addEventListener('change', filterTable);

        function filterTable() {
            const searchValue = document.getElementById('searchInput').value.toLowerCase();
            const rolValue = document.getElementById('filterRol').value;
            const estadoValue = document.getElementById('filterEstado').value;
            const rows = document.querySelectorAll('.usuario-row');

            rows.forEach(row => {
                const username = row.getAttribute('data-username');
                const rol = row.getAttribute('data-rol');
                const estado = row.getAttribute('data-estado');

                const matchSearch = username.includes(searchValue);
                const matchRol = rolValue === '' || rol === rolValue;
                const matchEstado = estadoValue === '' || estado === estadoValue;

                if (matchSearch && matchRol && matchEstado) {
                    row.style.display = '';
                } else {
                    row.style.display = 'none';
                }
            });
        }
    </script>
</body>
</html>
